name: Build & Release PharmaStock

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVAFX_VERSION: "21.0.6"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ── WiX 3.x — jpackage requires WiX 3, NOT WiX 4 ─────────────────
      - name: Install WiX 3
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" -OutFile "wix3.zip"
          Expand-Archive -Path "wix3.zip" -DestinationPath "wix3"
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\wix3"

      # ── Inject API key (utf8NoBOM — Java Properties.load fails on BOM) ─
      - name: Create config.properties
        shell: pwsh
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          $lines = @(
            "api.key=$env:GROQ_API_KEY",
            "api.url=https://api.groq.com/openai/v1/chat/completions",
            "model.name=llama-3.1-8b-instant",
            "admin.username=admin",
            "admin.password=admin123",
            "user.username=user",
            "user.password=user123"
          )
          [System.IO.File]::WriteAllLines("src/main/resources/config.properties", $lines)

      # ── Build fat JAR ─────────────────────────────────────────────────
      - name: Build fat JAR
        shell: pwsh
        run: ./mvnw.cmd package -q

      # ── Download JavaFX jmods ─────────────────────────────────────────
      - name: Download JavaFX jmods
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_windows-x64_bin-jmods.zip" `
            -OutFile "javafx-jmods.zip"
          Expand-Archive -Path "javafx-jmods.zip" -DestinationPath "javafx-jmods"

      # ── jlink: custom JRE with JavaFX + all SSL/TLS modules ───────────
      - name: Build custom JRE with jlink
        shell: pwsh
        run: |
          $jmodsPath = "javafx-jmods\javafx-jmods-${{ env.JAVAFX_VERSION }}"
          jlink `
            --module-path "$env:JAVA_HOME\jmods;$jmodsPath" `
            --add-modules java.base,java.desktop,java.logging,java.management,java.naming,java.net.http,java.prefs,java.security.jgss,java.security.sasl,java.xml,javafx.controls,javafx.fxml,javafx.graphics,javafx.base,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.localedata,jdk.zipfs `
            --output custom-jre `
            --strip-debug `
            --no-header-files `
            --no-man-pages `
            --compress zip-6

      # ── jpackage: .exe installer with desktop + start menu shortcut ───
      - name: Create Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          jpackage `
            --input target `
            --main-jar PharmaStock-fat.jar `
            --main-class pharmastock.ui.Launcher `
            --runtime-image custom-jre `
            --name PharmaStock `
            --app-version $version `
            --type exe `
            --win-shortcut `
            --win-shortcut-prompt `
            --win-menu `
            --win-dir-chooser `
            --win-per-user-install `
            --dest installer `
            --vendor "PharmaStock" `
            --description "Pharmacy Inventory Management System"

      # ── Upload .exe to GitHub Releases ────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/*.exe
          name: PharmaStock ${{ github.ref_name }}
          body: |
            ## PharmaStock ${{ github.ref_name }}

            ### Installation
            1. Download `PharmaStock-*.exe` below
            2. Double-click to install
            3. Desktop shortcut will be created automatically
            4. Launch PharmaStock from the shortcut — no Java required

            ### Login
            - Admin: `admin` / `admin123`
            - User: `user` / `user123`
