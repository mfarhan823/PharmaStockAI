name: Build & Release PharmaStock

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVAFX_VERSION: "21.0.6"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ── Inject API key ────────────────────────────────────────────────
      - name: Create config.properties
        shell: pwsh
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          "api.key=$env:GROQ_API_KEY"                              | Out-File -FilePath "src/main/resources/config.properties" -Encoding utf8
          "api.url=https://api.groq.com/openai/v1/chat/completions" | Out-File -FilePath "src/main/resources/config.properties" -Encoding utf8 -Append
          "model.name=llama-3.1-8b-instant"                        | Out-File -FilePath "src/main/resources/config.properties" -Encoding utf8 -Append

      # ── Build fat JAR ─────────────────────────────────────────────────
      - name: Build fat JAR
        shell: pwsh
        run: ./mvnw.cmd package -q

      # ── Download JavaFX jmods ─────────────────────────────────────────
      - name: Download JavaFX jmods
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_windows-x64_bin-jmods.zip" `
            -OutFile "javafx-jmods.zip"
          Expand-Archive -Path "javafx-jmods.zip" -DestinationPath "javafx-jmods"

      # ── jlink: custom JRE with JavaFX baked in ────────────────────────
      - name: Build custom JRE with jlink
        shell: pwsh
        run: |
          $jmodsPath = "javafx-jmods\javafx-jmods-${{ env.JAVAFX_VERSION }}"
          jlink `
            --module-path "$env:JAVA_HOME\jmods;$jmodsPath" `
            --add-modules java.base,java.desktop,java.logging,java.net.http,java.prefs,java.xml,javafx.controls,javafx.fxml,javafx.graphics,javafx.base `
            --output custom-jre `
            --strip-debug `
            --no-header-files `
            --no-man-pages `
            --compress=2

      # ── jpackage: portable app-image (no WiX needed) ─────────────────
      - name: Create portable app with jpackage
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          jpackage `
            --input target `
            --main-jar PharmaStock-fat.jar `
            --main-class pharmastock.ui.MainApp `
            --runtime-image custom-jre `
            --name PharmaStock `
            --app-version $version `
            --type app-image `
            --dest app-output

      # ── Zip the app-image folder for download ─────────────────────────
      - name: Zip app-image
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Compress-Archive `
            -Path "app-output\PharmaStock" `
            -DestinationPath "PharmaStock-$version-windows.zip"

      # ── Upload zip to GitHub Releases ─────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PharmaStock-*.zip
          name: PharmaStock ${{ github.ref_name }}
          body: |
            ## PharmaStock ${{ github.ref_name }}

            ### How to run
            1. Download `PharmaStock-*-windows.zip` below
            2. Extract the zip anywhere (e.g. Desktop)
            3. Open the extracted folder → double-click `PharmaStock.exe`
            4. No Java installation required

            ### Login
            - Admin: `admin` / `admin123`
            - User: `user` / `user123`
