name: Build & Release PharmaStock

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ── Inject API key — use PowerShell to avoid heredoc indentation issues
      - name: Create config.properties
        shell: pwsh
        run: |
          $content = @"
          api.key=${{ secrets.GROQ_API_KEY }}
          api.url=https://api.groq.com/openai/v1/chat/completions
          model.name=llama-3.1-8b-instant
          "@
          # Remove leading spaces from each line
          $content = ($content -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content -Path "src/main/resources/config.properties" -Value $content

      # ── Make mvnw executable and build fat JAR ────────────────────────
      - name: Build fat JAR
        shell: pwsh
        run: ./mvnw.cmd package -q

      # ── jpackage: strip the leading 'v' from tag for app-version ─────
      - name: Create Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          jpackage `
            --input target `
            --main-jar PharmaStock-fat.jar `
            --main-class pharmastock.ui.MainApp `
            --name PharmaStock `
            --app-version $version `
            --type exe `
            --win-shortcut `
            --win-menu `
            --dest installer

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/*.exe
          name: PharmaStock ${{ github.ref_name }}
          body: |
            ## PharmaStock ${{ github.ref_name }}

            ### Installation
            1. Download `PharmaStock-*.exe` below
            2. Run the installer — no Java required
            3. Launch from Start Menu or Desktop shortcut

            ### Login
            - Admin: `admin` / `admin123`
            - User: `user` / `user123`
